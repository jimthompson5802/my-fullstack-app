apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: my-fullstack-app
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: my-fullstack-frontend:latest
        imagePullPolicy: IfNotPresent # Use local image if available
        ports:
        - containerPort: 80
